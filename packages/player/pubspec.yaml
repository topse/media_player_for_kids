publish_to: "none"

resolution: workspace

version: 2.4.0+17

environment:
  sdk: ">=3.10.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dart_mappable: ^4.6.1

  dart_couch_widgets:
    git:
      url: https://github.com/topse/dart_couch
      path: packages/dart_couch_widgets

  watch_it: ^2.4.1
  shared_preferences: ^2.5.4
