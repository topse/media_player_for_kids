  path_provider: ^2.1.5
  just_audio: ^0.10.5
  audio_service: ^0.18.8
  audio_session: ^0.2.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
